<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e2e8f0;
      --text-muted: #8892a4;
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
      --purple: #a78bfa;
      --radius: 14px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--accent); }

    .live-dot {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .live-dot::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 28px;
    }

    .month-selector {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .month-selector label {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    select, input[type="date"], input[type="text"], input[type="number"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus, input:focus {
      border-color: var(--accent);
    }

    /* ── Add expense form ── */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-bottom: 28px;
    }

    .add-form h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-field label {
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .form-field input, .form-field select {
      min-width: 140px;
    }

    .form-field.wide input { min-width: 200px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 9px 22px;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.88; }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
      padding: 5px 12px;
      font-size: 0.8rem;
    }

    .btn-danger:hover { background: var(--red); color: #fff; }

    /* ── Stats row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 8px;
    }

    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    /* ── Charts grid ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 28px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .chart-card.full { grid-column: 1 / -1; }

    .chart-card h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 16px;
    }

    .chart-card canvas { max-height: 260px; }

    /* ── Table ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 28px;
    }

    .table-card h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 18px 20px 12px;
      border-bottom: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      padding: 11px 20px;
      font-size: 0.78rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      transition: background 0.15s;
    }

    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 11px 20px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
    }

    tbody tr:last-child td { border-bottom: none; }

    .cat-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .cat-Food { background: #34d39920; color: #34d399; }
    .cat-Shopping { background: #60a5fa20; color: #60a5fa; }
    .cat-Entertainment { background: #a78bfa20; color: #a78bfa; }
    .cat-Travel { background: #fbbf2420; color: #fbbf24; }

    .summary-row td {
      font-weight: 700;
      font-size: 0.95rem;
      background: var(--surface2);
      border-top: 2px solid var(--border);
    }

    .empty-msg {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.88rem;
      box-shadow: 0 8px 32px #0006;
      z-index: 999;
      transition: opacity 0.4s;
    }

    .toast.hide { opacity: 0; pointer-events: none; }

    @media (max-width: 700px) {
      .charts-grid { grid-template-columns: 1fr; }
      .chart-card.full { grid-column: auto; }
      header { padding: 14px 16px; }
      .container { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>💸 Expense <span>Tracker</span></h1>
  <div class="live-dot" id="liveStatus">Live</div>
</header>

<div class="container">

  <!-- Controls -->
  <div class="controls">
    <div class="month-selector">
      <label>Month</label>
      <input type="month" id="monthPicker" />
    </div>
  </div>

  <!-- Add Expense -->
  <div class="add-form">
    <h2>Add Expense</h2>
    <div class="form-row">
      <div class="form-field">
        <label>Date</label>
        <input type="date" id="expDate" />
      </div>
      <div class="form-field wide">
        <label>Item</label>
        <input type="text" id="expItem" placeholder="e.g. Lunch" />
      </div>
      <div class="form-field">
        <label>Category</label>
        <select id="expCategory">
          <option>Food</option>
          <option>Shopping</option>
          <option>Entertainment</option>
          <option>Travel</option>
        </select>
      </div>
      <div class="form-field">
        <label>Amount (SGD)</label>
        <input type="number" id="expAmount" placeholder="0.00" step="0.01" min="0" />
      </div>
      <button class="btn-primary" onclick="addExpense()">+ Add</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="label">Month Total</div>
      <div class="value" id="statTotal">$0.00</div>
    </div>
    <div class="stat-card">
      <div class="label">Food</div>
      <div class="value" id="statFood" style="color:var(--green)">$0.00</div>
    </div>
    <div class="stat-card">
      <div class="label">Shopping</div>
      <div class="value" id="statShopping" style="color:var(--blue)">$0.00</div>
    </div>
    <div class="stat-card">
      <div class="label">Entertainment</div>
      <div class="value" id="statEntertainment" style="color:var(--purple)">$0.00</div>
    </div>
    <div class="stat-card">
      <div class="label">Travel</div>
      <div class="value" id="statTravel" style="color:var(--yellow)">$0.00</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card">
      <h3>Spending by Category</h3>
      <canvas id="pieChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Cumulative Trend — This Month</h3>
      <canvas id="lineChart"></canvas>
    </div>
    <div class="chart-card full">
      <h3>Monthly Breakdown — This Year</h3>
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <h3 id="tableHeading">Expenses</h3>
    <div id="tableWrapper"></div>
  </div>

</div>

<div class="toast hide" id="toast"></div>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let allRows = []; // each row: [date, item, category, amount]
  const CATEGORIES = ['Food', 'Shopping', 'Entertainment', 'Travel'];
  const CAT_COLORS = {
    Food: '#34d399',
    Shopping: '#60a5fa',
    Entertainment: '#a78bfa',
    Travel: '#fbbf24',
  };

  // ── Init ─────────────────────────────────────────────────────────────────
  const monthPicker = document.getElementById('monthPicker');
  const expDate = document.getElementById('expDate');

  function todayLocal() {
    return new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD in local tz
  }

  function currentYM() {
    return todayLocal().slice(0, 7);
  }

  monthPicker.value = currentYM();
  expDate.value = todayLocal();

  monthPicker.addEventListener('change', render);

  // ── Fetch all data ────────────────────────────────────────────────────────
  async function loadData() {
    try {
      const res = await fetch('/expenses');
      allRows = await res.json();
      render();
    } catch (e) {
      showToast('Failed to load data');
    }
  }

  // ── SSE ───────────────────────────────────────────────────────────────────
  function connectSSE() {
    const es = new EventSource('/stream');
    es.onmessage = e => {
      allRows = JSON.parse(e.data);
      render();
    };
    es.onerror = () => {
      document.getElementById('liveStatus').style.opacity = '0.3';
      setTimeout(connectSSE, 5000);
    };
    es.onopen = () => {
      document.getElementById('liveStatus').style.opacity = '1';
    };
  }

  // ── Add expense ───────────────────────────────────────────────────────────
  async function addExpense() {
    const date = document.getElementById('expDate').value;
    const item = document.getElementById('expItem').value.trim();
    const category = document.getElementById('expCategory').value;
    const amount = parseFloat(document.getElementById('expAmount').value);

    if (!date || !item || isNaN(amount) || amount <= 0) {
      showToast('Please fill in all fields correctly');
      return;
    }

    try {
      const res = await fetch('/add-expense', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date, item, category, amount }),
      });
      if (!res.ok) throw new Error((await res.json()).error);
      document.getElementById('expItem').value = '';
      document.getElementById('expAmount').value = '';
      showToast('✅ Expense added');
    } catch (e) {
      showToast('Error: ' + e.message);
    }
  }

  // ── Delete expense ────────────────────────────────────────────────────────
  async function deleteExpense(rowIndex) {
    if (!confirm('Delete this entry?')) return;
    try {
      const res = await fetch('/delete-expense', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rowIndex }),
      });
      if (!res.ok) throw new Error((await res.json()).error);
      showToast('🗑 Deleted');
    } catch (e) {
      showToast('Error: ' + e.message);
    }
  }

  // ── Render ────────────────────────────────────────────────────────────────
  let pieChart, lineChart, barChart;

  function render() {
    const ym = monthPicker.value; // YYYY-MM
    const monthRows = allRows.filter(r => r[0] && r[0].startsWith(ym));
    const year = ym.slice(0, 4);

    renderStats(monthRows);
    renderTable(monthRows);
    renderPie(monthRows);
    renderLine(monthRows, ym);
    renderBar(year);
  }

  function renderStats(rows) {
    const totals = { Food: 0, Shopping: 0, Entertainment: 0, Travel: 0 };
    rows.forEach(r => { totals[r[2]] = (totals[r[2]] || 0) + parseFloat(r[3] || 0); });
    const grand = Object.values(totals).reduce((a, b) => a + b, 0);
    document.getElementById('statTotal').textContent = '$' + grand.toFixed(2);
    CATEGORIES.forEach(c => {
      document.getElementById('stat' + c).textContent = '$' + (totals[c] || 0).toFixed(2);
    });
  }

  function renderTable(rows) {
    const wrap = document.getElementById('tableWrapper');
    const ym = monthPicker.value;
    const label = new Date(ym + '-01').toLocaleString('en-US', { month: 'long', year: 'numeric' });
    document.getElementById('tableHeading').textContent = `${label} Expenses`;

    if (!rows.length) {
      wrap.innerHTML = '<div class="empty-msg">No expenses for this month.</div>';
      return;
    }

    // Build index map: rows is filtered by month, but rowIndex in allRows matters for delete
    const total = rows.reduce((s, r) => s + parseFloat(r[3] || 0), 0);

    let html = `<table>
      <thead><tr>
        <th>Date</th><th>Item</th><th>Category</th><th>Amount (SGD)</th><th></th>
      </tr></thead><tbody>`;

    rows.forEach(row => {
      const globalIdx = allRows.indexOf(row);
      const [date, item, cat, amt] = row;
      html += `<tr>
        <td>${date}</td>
        <td>${escHtml(item)}</td>
        <td><span class="cat-badge cat-${cat}">${cat}</span></td>
        <td>$${parseFloat(amt).toFixed(2)}</td>
        <td><button class="btn-danger" onclick="deleteExpense(${globalIdx})">Delete</button></td>
      </tr>`;
    });

    html += `</tbody>
      <tfoot><tr class="summary-row">
        <td colspan="3">Total</td>
        <td>$${total.toFixed(2)}</td>
        <td></td>
      </tr></tfoot>
    </table>`;

    wrap.innerHTML = html;
  }

  function renderPie(rows) {
    const totals = {};
    CATEGORIES.forEach(c => { totals[c] = 0; });
    rows.forEach(r => { totals[r[2]] = (totals[r[2]] || 0) + parseFloat(r[3] || 0); });

    const labels = CATEGORIES.filter(c => totals[c] > 0);
    const data = labels.map(c => totals[c]);
    const colors = labels.map(c => CAT_COLORS[c]);

    const ctx = document.getElementById('pieChart').getContext('2d');
    if (pieChart) pieChart.destroy();

    if (!data.length) {
      ctx.clearRect(0, 0, 999, 999);
      return;
    }

    pieChart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#1a1d27' }] },
      options: {
        plugins: {
          legend: { labels: { color: '#e2e8f0', font: { size: 12 } } },
          tooltip: { callbacks: { label: ctx => ` $${ctx.parsed.toFixed(2)}` } },
        },
        cutout: '60%',
      },
    });
  }

  function renderLine(rows, ym) {
    const [year, month] = ym.split('-').map(Number);
    const daysInMonth = new Date(year, month, 0).getDate();
    const daily = Array(daysInMonth).fill(0);

    rows.forEach(r => {
      const d = parseInt(r[0].split('-')[2]) - 1;
      if (d >= 0 && d < daysInMonth) daily[d] += parseFloat(r[3] || 0);
    });

    let cum = 0;
    const cumulative = daily.map(v => (cum += v));
    const labels = Array.from({ length: daysInMonth }, (_, i) => i + 1);

    const ctx = document.getElementById('lineChart').getContext('2d');
    if (lineChart) lineChart.destroy();

    lineChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Cumulative SGD',
          data: cumulative,
          borderColor: '#6c63ff',
          backgroundColor: '#6c63ff22',
          fill: true,
          tension: 0.3,
          pointRadius: 3,
        }],
      },
      options: {
        scales: {
          x: { ticks: { color: '#8892a4' }, grid: { color: '#2e334720' } },
          y: { ticks: { color: '#8892a4', callback: v => '$' + v }, grid: { color: '#2e334740' } },
        },
        plugins: { legend: { display: false } },
      },
    });
  }

  function renderBar(year) {
    const months = Array.from({ length: 12 }, (_, i) =>
      new Date(year, i, 1).toLocaleString('en-US', { month: 'short' })
    );

    const datasets = CATEGORIES.map(cat => ({
      label: cat,
      data: Array(12).fill(0),
      backgroundColor: CAT_COLORS[cat] + 'cc',
    }));

    allRows.forEach(r => {
      if (!r[0] || !r[0].startsWith(year)) return;
      const m = parseInt(r[0].split('-')[1]) - 1;
      const catIdx = CATEGORIES.indexOf(r[2]);
      if (catIdx !== -1 && m >= 0 && m < 12) {
        datasets[catIdx].data[m] += parseFloat(r[3] || 0);
      }
    });

    const ctx = document.getElementById('barChart').getContext('2d');
    if (barChart) barChart.destroy();

    barChart = new Chart(ctx, {
      type: 'bar',
      data: { labels: months, datasets },
      options: {
        scales: {
          x: { stacked: true, ticks: { color: '#8892a4' }, grid: { color: '#2e334720' } },
          y: { stacked: true, ticks: { color: '#8892a4', callback: v => '$' + v }, grid: { color: '#2e334740' } },
        },
        plugins: {
          legend: { labels: { color: '#e2e8f0', font: { size: 12 } } },
          tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}` } },
        },
      },
    });
  }

  // ── Toast ─────────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('hide');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.add('hide'), 3000);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Allow Enter key on form ───────────────────────────────────────────────
  document.getElementById('expAmount').addEventListener('keydown', e => {
    if (e.key === 'Enter') addExpense();
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  loadData();
  connectSSE();
</script>
</body>
</html>
